    }
}

// extractRaw : decode les fichiers raw chunky/planar Amiga (HUD, bordures, visages...)
// Usage : ./gradlew extractRaw                     # Extrait tous les candidats
//         ./gradlew extractRaw -Praw=panelraw      # Un seul fichier
// Les fichiers RAW source sont dans media/includes (PAS dans media/graphics).
// Genere plusieurs PNG candidats par fichier pour identification visuelle.
tasks.register('extractRaw', JavaExec) {
    group='ab3d2'; description='Decode les RAW chunky/planar Amiga (HUD, bordures) en PNG'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.RawExtractor'
    jvmArgs    = ['--enable-preview', '-Xmx256m']
    doFirst {
        def incDir = file('../ab3d2-tkg-original/media/includes')
        if (!incDir.isDirectory()) {
            def p = project.hasProperty('rawFrom') ? file(project.property('rawFrom')) : null
            if (p != null && p.isDirectory()) incDir = p
            else throw new GradleException('media/includes introuvable (attendu ../ab3d2-tkg-original/media/includes)')
        }
        file('assets/Interface').mkdirs()
        args incDir.absolutePath, file('assets/Interface').absolutePath
        if (project.hasProperty('raw')) args project.property('raw')
    }
}

// viewVectObj : viewer 3D interactif pour les .j3o vectobj avec animations
// Usage : ./gradlew viewVectObj                    # premier modele de la liste
//         ./gradlew viewVectObj -Pmodel=rifle      # modele specifique
// Controles : [<-/->] changer modele, [Space] play/pause, [+/-] FPS,
//             [N/B] step frame, [R] reset cam, [G] grille, [W] wireframe,
//             [A] auto-rotation, drag souris = orbit, molette = zoom
tasks.register('viewVectObj', JavaExec) {
    group='ab3d2'; description='Viewer 3D pour inspecter les modeles vectobj et leurs animations'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.VectObjViewer'
    jvmArgs    = ['--enable-preview', '-Xmx512m']
    if (System.getProperty("os.name").toLowerCase().contains("mac"))
        jvmArgs += ['-XstartOnFirstThread']
    standardInput = System.in
    doFirst {
        def vectDir = file('assets/Scenes/vectobj')
        if (!vectDir.isDirectory() || (vectDir.listFiles()?.count{it.name.endsWith('.j3o')}?:0)==0)
            throw new GradleException("Aucun .j3o dans assets/Scenes/vectobj - lancer 'gradlew convertVectObj' d'abord")
        if (project.hasProperty('model')) args project.property('model')
    }
}

// ── setupAll : pipeline complet ───────────────────────────────────────────────
// Ordre : copyResources -> convertAssets -> convertLevels -> convertSounds -> buildScenes
// Note: convertWads est optionnel (necessite les fichiers WAD du jeu original)
tasks.register('setupAll') {
    group='ab3d2'; description='Pipeline complet de conversion'
    dependsOn 'copyResources','convertAssets','convertLevels','convertSounds','buildScenes'
}

// ── levelInspect : audit des donnees enrichies (session 99) ───────────────────
// Affiche un rapport humain-readable des messages, control points, teleporteurs,
// zones a 2 niveaux (mezzanines), zones water, doors/lifts/switches.
// Usage : ./gradlew levelInspect              # Tous les niveaux
//         ./gradlew levelInspect -Plevel=A    # Un seul niveau
tasks.register('levelInspect', JavaExec) {
    group='ab3d2'; description='Rapport detaille des donnees de niveau (telep, water, upper, etc.)'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.LevelInspector'
    jvmArgs    = ['--enable-preview', '-Xmx256m']
    standardOutput = System.out
    doFirst {
        args file('assets/levels').absolutePath
        if (project.hasProperty('level')) args project.property('level')
    }
}
tasks.named('convertAssets') { mustRunAfter('copyResources') }
tasks.named('convertLevels') { mustRunAfter('convertAssets') }
tasks.named('convertSounds') { mustRunAfter('convertLevels') }
tasks.named('buildScenes')   { mustRunAfter('convertSounds') }

// ── resourcesStatus ───────────────────────────────────────────────────────────
tasks.register('resourcesStatus') {
    group='ab3d2'; description="Etat des ressources et assets"
    doLast {
        def res=file('src/main/resources'), src=findSourceResources()
        println "\n=== AB3D2 Etat des ressources ==="
        ['menu','levels','walls','floors'].each { d ->
            def lo=new File(res,d), re=src?new File(src,d):null
            println "  ${d.padRight(8)} local=${lo.exists()?'OK':'--'}  source=${re?.exists()?'OK':'absent'}"
        }
        def nW = file('assets/Textures/walls').exists()   ? file('assets/Textures/walls').listFiles()?.count{it.name.endsWith('.png')}?:0 : 0
        def nF = file('assets/Textures/floors').exists()  ? file('assets/Textures/floors').listFiles()?.count{it.name.endsWith('.png')}?:0 : 0
        def nO = file('assets/Textures/objects').exists() ? file('assets/Textures/objects').listFiles()?.size()?:0 : 0
        def nL = file('assets/levels').exists()  ? file('assets/levels').listFiles()?.count{it.name.endsWith('.json')}?:0 : 0
        def nS = file('assets/Scenes').exists()  ? file('assets/Scenes').listFiles()?.count{it.name.endsWith('.j3o')}?:0 : 0
        println "\n  walls PNG   : $nW  floors PNG: $nF  objects: $nO"
        println "  levels JSON : $nL  scenes j3o: $nS"
        println "\n  Pipeline    : ./gradlew setupAll run"
        println "  Avec WAD    : ./gradlew convertWads buildScenes run  (necessite jeu original)"
    }
}

// ── cleanResources ────────────────────────────────────────────────────────────
tasks.register('cleanResources', Delete) {
    group='ab3d2'; description='Supprime assets convertis'
    delete fileTree('src/main/resources')          { exclude 'logback.xml' }
    delete fileTree('assets/Textures/walls')        { include '*.png' }
    delete fileTree('assets/Textures/floors')       { include '*.png' }
    delete fileTree('assets/Textures/objects')
    delete fileTree('assets/levels')                { include '*.json' }
    delete fileTree('assets/Scenes')                { include '*.j3o' }
    delete fileTree('assets/Sounds/sfx')            { include '*.wav' }
}

compileJava { options.compilerArgs += ['--enable-preview'] }
compileTestJava { options.compilerArgs += ['--enable-preview'] }
jar { manifest { attributes 'Main-Class': application.mainClass } }
java { toolchain { languageVersion = JavaLanguageVersion.of(21) } }
wrapper { gradleVersion = '8.6' }
