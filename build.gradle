plugins { id 'java'; id 'application' }

group 'com.ab3d2'
version '0.1.0-SNAPSHOT'

application {
    applicationName = 'ab3d2-tkg-jme'
    mainClass = 'com.ab3d2.Main'
    applicationDefaultJvmArgs = ['--enable-preview','-Xmx1g','-Dfile.encoding=UTF-8']
    if (System.getProperty("os.name").toLowerCase().contains("mac"))
        applicationDefaultJvmArgs += ['-XstartOnFirstThread']
}

repositories { mavenCentral(); maven { url 'https://jitpack.io' } }

project.ext { jmeVer='3.8.1-stable'; lemurVer='1.16.0' }

project(":assets") {
    apply plugin: "java"
    buildDir = rootProject.file("build/assets")
    sourceSets { main { resources { srcDir '.' } } }
    java { toolchain { languageVersion = JavaLanguageVersion.of(21) } }
}

dependencies {
    implementation "org.jmonkeyengine:jme3-core:$jmeVer"
    implementation "org.jmonkeyengine:jme3-desktop:$jmeVer"
    implementation "org.jmonkeyengine:jme3-lwjgl3:$jmeVer"
    implementation "org.jmonkeyengine:jme3-effects:$jmeVer"
    implementation "org.jmonkeyengine:jme3-plugins:$jmeVer"
    implementation "org.jmonkeyengine:jme3-jogg:$jmeVer"
    if (!System.getProperty("os.name").toLowerCase().contains("mac"))
        implementation "org.jmonkeyengine:jme3-awt-dialogs:$jmeVer"
    implementation "com.simsilica:lemur:$lemurVer"
    implementation "com.simsilica:lemur-proto:1.13.0"
    implementation "com.github.stephengold:Minie:9.0.1"
    implementation "org.jmonkeyengine:jme3-networking:$jmeVer"
    implementation 'org.slf4j:slf4j-api:2.0.9'
    runtimeOnly   'ch.qos.logback:logback-classic:1.4.14'
    runtimeOnly project(':assets')

    // Tests (session 113 : machine a etats IA aliens)
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
    testRuntimeOnly  'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
    jvmArgs '--enable-preview'
    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = true
    }
}

def findSourceResources() {
    if (project.hasProperty('assetsFrom')) { def p=file(project.property('assetsFrom')); if(p.isDirectory()) return p }
    def s=file('../ab3d2-tkg-java/src/main/resources'); if(s.isDirectory()) return s
    def e=System.getenv('AB3D2_ASSETS_SRC'); if(e){def p=file(e);if(p.isDirectory())return p}
    return null
}

// ── copyResources ─────────────────────────────────────────────────────────────
tasks.register('copyResources', Copy) {
    group='ab3d2'; description='Copie les ressources binaires Amiga'
    def src=findSourceResources()
    if(src==null){doFirst{throw new GradleException("Source introuvable")}}
    else{from(src){exclude 'logback.xml'};into 'src/main/resources';doFirst{logger.lifecycle("copyResources : {}",src)}}
}

// ── convertAssets ─────────────────────────────────────────────────────────────
tasks.register('convertAssets', JavaExec) {
    group='ab3d2'; description='Convertit assets Amiga -> PNG (walls + floors)'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.AssetConverter'
    doFirst {
        def src = project.hasProperty('assetsFrom') ? file(project.property('assetsFrom')) : findSourceResources()
        if(src==null||!src.isDirectory()) throw new GradleException("Source introuvable")
        file('assets/Textures/walls').mkdirs(); file('assets/Textures/floors').mkdirs()
        args src.absolutePath, file('assets/Textures/walls').absolutePath, file('assets/Textures/floors').absolutePath
    }
}

// ── convertLevels ─────────────────────────────────────────────────────────────
tasks.register('convertLevels', JavaExec) {
    group='ab3d2'; description='Convertit niveaux binaires -> JSON'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.LevelJsonExporter'
    doFirst {
        def src = project.hasProperty('assetsFrom') ? file(project.property('assetsFrom')) : findSourceResources()
        if(src==null||!src.isDirectory()) throw new GradleException("Source introuvable")
        file('assets/levels').mkdirs()
        args src.absolutePath, file('assets/levels').absolutePath
    }
}

// ── convertSounds ─────────────────────────────────────────────────────────────
tasks.register('convertSounds', JavaExec) {
    group='ab3d2'; description='Convertit samples Amiga raw -> WAV'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.SoundConverter'
    doFirst {
        def src = project.hasProperty('assetsFrom') ? file(project.property('assetsFrom')) : findSourceResources()
        if(src==null||!src.isDirectory()) throw new GradleException("Source introuvable")
        def soundSrc = new File(src, 'sounds/raw')
        if(!soundSrc.isDirectory()) throw new GradleException("sounds/raw introuvable")
        file('assets/Sounds/sfx').mkdirs()
        args soundSrc.absolutePath, file('assets/Sounds/sfx').absolutePath
    }
}

// ── convertWads : WAD+PTR+256PAL -> PNG sprites (via TEST.LNK) ────────────────
tasks.register('convertWads', JavaExec) {
    group='ab3d2'; description='Convertit sprites WAD/PTR/256PAL -> PNG (necessite les fichiers WAD du jeu original)'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.WadConverter'
    doFirst {
        def src = project.hasProperty('assetsFrom') ? file(project.property('assetsFrom')) : findSourceResources()
        if(src==null||!src.isDirectory()) throw new GradleException('Source introuvable')
        file('assets/Textures/objects').mkdirs()
        args src.absolutePath, file('assets/Textures/objects').absolutePath
    }
}

// ── analyzeAssets ─────────────────────────────────────────────────────────────
tasks.register('analyzeAssets', JavaExec) {
    group='ab3d2'; description='Analyse binaires AB3D2 + dump TEST.LNK'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.AssetAnalyzer'
    doFirst {
        def src = project.hasProperty('assetsFrom') ? file(project.property('assetsFrom')) : findSourceResources()
        if(src != null && src.isDirectory()) args src.absolutePath
    }
}

// ── buildScenes ───────────────────────────────────────────────────────────────
tasks.register('buildScenes', JavaExec) {
    group='ab3d2'; description='JSON + textures -> .j3o JME'
    dependsOn compileJava
    classpath   = sourceSets.main.runtimeClasspath
    mainClass   = 'com.ab3d2.tools.LevelSceneBuilder'
    jvmArgs     = ['--enable-preview', '-Xmx1g']
    doFirst {
        def levelsDir = file('assets/levels')
        if(!levelsDir.exists() || (levelsDir.listFiles()?.count{it.name.endsWith('.json')}?:0)==0)
            throw new GradleException("Pas de JSON -> lancer convertLevels d'abord")
        file('assets/Scenes').mkdirs()
        args levelsDir.absolutePath, file('assets/Scenes').absolutePath, file('assets').absolutePath
    }
}

// ── convertTextureMaps : newtexturemaps -> PNG atlas ────────────────────────
tasks.register('convertTextureMaps', JavaExec) {
    group='ab3d2'; description='Convertit les textures vectobj (newtexturemaps) -> PNG atlas'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.TextureMapConverter'
    doFirst {
        def vectDir = file('src/main/resources/vectobj')
        if (!vectDir.isDirectory() || !new File(vectDir, 'newtexturemaps').exists())
            throw new GradleException('newtexturemaps introuvable dans src/main/resources/vectobj/')
        file('assets/Textures/vectobj').mkdirs()
        args vectDir.absolutePath,
             file('src/main/resources').absolutePath,
             file('assets/Textures/vectobj').absolutePath
    }
}

// ── convertVectObj : fichiers binaires vectobj -> .j3o ──────────────────────
tasks.register('convertVectObj', JavaExec) {
    group='ab3d2'; description='Convertit les modeles 3D vectoriels vectobj -> .j3o JME'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.VectObjConverter'
    jvmArgs    = ['--enable-preview', '-Xmx512m']
    doFirst {
        def vectDir = file('src/main/resources/vectobj')
        if (!vectDir.isDirectory())
            throw new GradleException('vectobj/ introuvable dans src/main/resources/')
        file('assets/Scenes/vectobj').mkdirs()
        args vectDir.absolutePath,
             file('assets/Scenes/vectobj').absolutePath,
             file('assets').absolutePath
    }
}

// dumpVectObj : diagnostic format binaire vectobj
tasks.register('dumpVectObj', JavaExec) {
    group='ab3d2'; description='Dump le format binaire d\'un fichier vectobj (diagnostic)'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.VectObjDumper'
    jvmArgs    = ['--enable-preview', '-Xmx256m']
    standardOutput = System.out
    // Usage : ./gradlew dumpVectObj -Pvectobj=passkey
    // Defaut : dump passkey + switch + plink
    doFirst {
        if (project.hasProperty('vectobj')) {
            def name = project.property('vectobj')
            args file("src/main/resources/vectobj/${name}").absolutePath
        }
    }
}

