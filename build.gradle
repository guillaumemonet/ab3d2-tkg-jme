// extractIff : decode les IFF ILBM Amiga (HUD, bordures, faces, armes...) -> PNG
// Usage : ./gradlew extractIff              # extrait tous les IFF standard
//         ./gradlew extractIff -Piff=Panel  # un seul fichier specifique
tasks.register('extractIff', JavaExec) {
    group='ab3d2'; description='Extrait les HUD/bordures/sprites IFF ILBM Amiga en PNG'
    dependsOn compileJava
    classpath = sourceSets.main.runtimeClasspath
    mainClass  = 'com.ab3d2.tools.IffExtractor'
    jvmArgs    = ['--enable-preview', '-Xmx256m']
    doFirst {
        def gfxDir = file('../ab3d2-tkg-original/media/graphics')
        if (!gfxDir.isDirectory()) {
            def p = project.hasProperty('gfxFrom') ? file(project.property('gfxFrom')) : null
            if (p != null && p.isDirectory()) gfxDir = p
            else throw new GradleException('media/graphics introuvable (attendu ../ab3d2-tkg-original/media/graphics)')
        }
        file('assets/Interface').mkdirs()
        args gfxDir.absolutePath, file('assets/Interface').absolutePath
        if (project.hasProperty('iff')) args project.property('iff')
    }
}

